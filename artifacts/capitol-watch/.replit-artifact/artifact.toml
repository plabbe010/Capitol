kind = "web"
previewPath = "/"
title = "Capitol Watch"
version = "1.0.0"
id = "artifacts/capitol-watch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23930
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/capitol-watch run dev"

[services.env]
PORT = "23930"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/capitol-watch", "run", "build"]
publicDir = "artifacts/capitol-watch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
